name: Daily Automation Bot

on:
  schedule:
    # 早上 8:00 (香港時間) 執行 -> UTC 00:00
    - cron: '0 0 * * *'
    # 下午 3:00 (香港時間) 執行 -> UTC 07:00
    - cron: '0 7 * * *'
  workflow_dispatch: # 允許你隨時手動在 GitHub 點擊執行

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Morning Digest
        # 只有在 UTC 00:00 (香港時間早上 8 點) 時執行
        if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
        run: npm run test-morning
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_API_SECRET: ${{ secrets.NOTION_API_SECRET }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - name: Run Afternoon Digest (Notion Notes)
        # 只有在 UTC 07:00 (香港時間下午 3 點) 時執行
        if: github.event.schedule == '0 7 * * *' || github.event_name == 'workflow_dispatch'
        run: npm run test-afternoon
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_API_SECRET: ${{ secrets.NOTION_API_SECRET }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
